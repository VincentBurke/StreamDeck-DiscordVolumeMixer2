name: Windows Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      BUILD_TYPE: Release
      PLUGIN_DIR: cz.danol.discordmixer.sdPlugin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          arch: "win64_msvc2019_64"
          modules: "qtwebsockets"

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: pwsh
        run: cmake --build build

      - name: Install
        shell: pwsh
        run: cmake --install build

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $manifest = Get-Content dist/manifest.json | ConvertFrom-Json
          $version = $manifest.Version
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $isTag = "${{ github.ref_type }}" -eq "tag"

          if ($isTag) {
            $releaseTag = "${{ github.ref_name }}"
            $releaseName = "${{ github.ref_name }}"
            $packageVersion = $version
            $prerelease = "false"
            $makeLatest = "true"
          }
          else {
            $releaseTag = "dev-$shortSha"
            $releaseName = "dev-$shortSha"
            $packageVersion = "$version-dev.$shortSha"
            $prerelease = "true"
            $makeLatest = "false"
          }

          if ("${{ github.ref_type }}" -eq "tag") {
            $expectedTag = "v$version"
            if ("${{ github.ref_name }}" -ne $expectedTag) {
              throw "Tag '${{ github.ref_name }}' does not match manifest version '$expectedTag'."
            }
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          "make_latest=$makeLatest" >> $env:GITHUB_OUTPUT

      - name: Package plugin
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.package_version }}"
          $pluginPath = Join-Path $PWD "bin/$env:BUILD_TYPE/$env:PLUGIN_DIR"
          if (-not (Test-Path $pluginPath)) {
            throw "Plugin directory not found: $pluginPath"
          }
          $artifactDir = Join-Path $PWD artifacts
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          $zipPath = Join-Path $artifactDir "Discord-Volume-Mixer-$version.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path $pluginPath -DestinationPath $zipPath
          $packagePath = Join-Path $artifactDir "Discord-Volume-Mixer-$version.streamDeckPlugin"
          Move-Item $zipPath $packagePath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: discord-volume-mixer-${{ steps.version.outputs.package_version }}
          path: artifacts/*.streamDeckPlugin

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.release_name }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          make_latest: ${{ steps.version.outputs.make_latest }}
          generate_release_notes: true
          files: artifacts/*.streamDeckPlugin
