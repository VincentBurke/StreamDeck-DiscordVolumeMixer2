name: Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      BUILD_TYPE: Release
      PLUGIN_DIR: cz.danol.discordmixer.sdPlugin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.5.3"
          arch: "win64_msvc2019_64"

      - name: Configure
        shell: pwsh
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=$env:BUILD_TYPE

      - name: Build
        shell: pwsh
        run: cmake --build build --config $env:BUILD_TYPE

      - name: Install
        shell: pwsh
        run: cmake --install build --config $env:BUILD_TYPE

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $manifest = Get-Content dist/manifest.json | ConvertFrom-Json
          $version = $manifest.Version
          if ("${{ github.ref_type }}" -eq "tag") {
            $expectedTag = "v$version"
            if ("${{ github.ref_name }}" -ne $expectedTag) {
              throw "Tag '${{ github.ref_name }}' does not match manifest version '$expectedTag'."
            }
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Package plugin
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $pluginPath = Join-Path $PWD "bin/$env:BUILD_TYPE/$env:PLUGIN_DIR"
          if (-not (Test-Path $pluginPath)) {
            throw "Plugin directory not found: $pluginPath"
          }
          $artifactDir = Join-Path $PWD artifacts
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null
          $zipPath = Join-Path $artifactDir "Discord-Volume-Mixer-$version.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path $pluginPath -DestinationPath $zipPath
          $packagePath = Join-Path $artifactDir "Discord-Volume-Mixer-$version.streamDeckPlugin"
          Move-Item $zipPath $packagePath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: discord-volume-mixer-${{ steps.version.outputs.version }}
          path: artifacts/*.streamDeckPlugin

      - name: Publish release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.streamDeckPlugin
